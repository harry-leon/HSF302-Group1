<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${pageTitle}">Tour Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/app.css}" rel="stylesheet">
</head>
<body>
<main class="container py-5">
    <div class="panel p-4 p-md-5 mx-auto" style="max-width: 920px;">
        <div class="d-flex justify-content-between align-items-start gap-3 mb-4">
            <div>
                <span class="eyebrow text-dark">Admin form</span>
                <h1 class="fw-bold mt-2 mb-1" th:text="${pageTitle}">Tour Form</h1>
                <p class="text-muted mb-0">Use this form to create or update a tour in the demo list.</p>
            </div>
            <a class="btn btn-outline-secondary" th:href="@{/tour/admin}">Back to admin</a>
        </div>

        <form class="row g-3" th:action="@{/tour/admin/save}" method="post" th:object="${tourForm}">
            <div class="col-md-3">
                <label class="form-label">ID</label>
                <input class="form-control" th:field="*{id}" placeholder="t5">
            </div>
            <div class="col-md-9">
                <label class="form-label">Name</label>
                <input class="form-control" th:field="*{name}" placeholder="Tour name" required>
            </div>
            <div class="col-md-6">
                <label class="form-label">Location</label>
                <input class="form-control" th:field="*{location}" placeholder="Location" required>
            </div>
            <div class="col-md-2">
                <label class="form-label">Price</label>
                <input class="form-control" type="number" th:field="*{price}" min="0" required>
            </div>
            <div class="col-md-2">
                <label class="form-label">Rating</label>
                <input class="form-control" type="number" step="0.1" min="0" max="5" th:field="*{rating}" required>
            </div>
            <div class="col-md-12">
                <label class="form-label">Summary</label>
                <textarea class="form-control" rows="4" th:field="*{summary}" required></textarea>
            </div>
            <div class="col-12 d-flex gap-2">
                <button class="btn btn-success btn-lg" type="submit" th:text="${formMode}">Save</button>
                <a class="btn btn-outline-secondary btn-lg" th:href="@{/tour/admin}">Cancel</a>
            </div>
        </form>
    </div>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
