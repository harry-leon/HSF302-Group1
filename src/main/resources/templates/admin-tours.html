<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin Tours</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/app.css}" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark topbar sticky-top">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/}">Dieu Dao Travel</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" th:href="@{/tour}">Customer</a>
            <a class="nav-link active" th:href="@{/tour/admin}">Admin</a>
            <a class="btn btn-outline-light btn-sm ms-lg-2" th:href="@{/logout}">Đăng xuất</a>
            <a class="btn btn-warning fw-semibold ms-lg-2" th:href="@{/tour/admin/create}">Create tour</a>
        </div>
    </div>
</nav>

<main class="container py-5">
    <div class="page-head d-flex flex-column flex-lg-row justify-content-between align-items-lg-end gap-3 mb-4">
        <div>
            <span class="eyebrow text-dark">Admin dashboard</span>
            <h1 class="fw-bold mt-2 mb-1">Tour management</h1>
            <p class="text-muted mb-0">Admin can add, edit, and delete tours from the in-memory demo list.</p>
        </div>
        <a class="btn btn-success btn-lg" th:href="@{/tour/admin/create}">Add new tour</a>
    </div>

    <div class="alert alert-success" th:if="${adminMessage}" th:text="${adminMessage}"></div>
    <div class="alert alert-light border mb-4">
        Total tours in system: <strong th:text="${totalTours}">0</strong>
    </div>

    <div class="table-responsive panel p-3 p-md-4">
        <table class="table align-middle table-hover">
            <thead class="table-light">
            <tr>
                <th>Image</th>
                <th>ID</th>
                <th>Name</th>
                <th>Location</th>
                <th>Price</th>
                <th>Rating</th>
                <th class="text-end">Action</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="tour : ${tours}">
                <td>
                    <img class="admin-thumb" th:src="${tour.imageUrl()}" th:alt="${tour.name()}">
                </td>
                <td th:text="${tour.id()}">t1</td>
                <td class="fw-semibold" th:text="${tour.name()}">Name</td>
                <td th:text="${tour.location()}">Location</td>
                <td th:text="${'$' + tour.price()}">$429</td>
                <td th:text="${tour.rating()}">4.9</td>
                <td class="text-end">
                    <a class="btn btn-outline-primary btn-sm" th:href="@{'/tour/admin/edit/' + ${tour.id()}}">Edit</a>
                    <a class="btn btn-outline-danger btn-sm" th:href="@{'/tour/admin/delete/' + ${tour.id()}}">Delete</a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
