<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Confirmation</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/app.css}" rel="stylesheet">
</head>
<body>
<main class="container py-5">
    <div class="panel p-5 mx-auto confirmation-shell" style="max-width: 760px;">
        <div class="badge text-bg-success mb-3">Payment success demo</div>
        <h1 class="fw-bold">Booking confirmed</h1>
        <p class="text-muted" th:text="${checkoutMessage ?: 'Mock payment approved and booking stored in demo state.'}">Success message</p>
        <div class="success-banner my-4">
            <div class="success-dot"></div>
            <div>
                <div class="fw-semibold">Your itinerary is locked in</div>
                <div class="text-muted small">This is a frontend-only confirmation state for presentation.</div>
            </div>
        </div>
        <div class="row g-3">
            <div class="col-md-6">
                <div class="info-box">
                    <div class="small text-muted">Tour</div>
                    <div class="fw-semibold" th:text="${checkoutTour != null ? checkoutTour.name() : 'Sapa 3N2Đ'}">Tour</div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="info-box">
                    <div class="small text-muted">Travelers</div>
                    <div class="fw-semibold" th:text="${checkoutTravelers ?: 2}">2</div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="info-box">
                    <div class="small text-muted">Email</div>
                    <div class="fw-semibold" th:text="${checkoutEmail ?: 'demo@example.com'}">demo@example.com</div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="info-box">
                    <div class="small text-muted">Next action</div>
                    <div class="fw-semibold">Send voucher email</div>
                </div>
            </div>
        </div>
        <div class="mt-4 d-flex gap-2">
            <a class="btn btn-success" th:href="@{/tour}">Back to tours</a>
            <a class="btn btn-outline-success" th:href="@{/tour/blog}">View blog</a>
        </div>
    </div>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
