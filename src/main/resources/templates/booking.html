<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Booking</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/app.css}" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark topbar sticky-top">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/}">Dieu Dao Travel</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" th:href="@{/tour}">Tours</a>
            <a class="nav-link" th:href="@{/tour/blog}">Blog</a>
            <a class="nav-link" th:href="@{/tour/chat}">AI Chat</a>
        </div>
    </div>
</nav>

<main class="container py-5">
    <div class="panel p-4 p-md-5 mx-auto booking-shell" style="max-width: 900px;">
        <div class="row g-4">
            <div class="col-lg-5">
                <span class="eyebrow">Booking flow</span>
                <h1 class="fw-bold mt-2" th:text="${tour.name()}">Tour</h1>
                <p class="text-muted" th:text="${tour.summary()}">Summary</p>
                <div class="price-box">
                    <div class="small text-muted">Total demo price</div>
                    <div class="fs-2 fw-bold text-success" th:text="${'$' + tour.price()}">$429</div>
                </div>
                <div class="progress-steps mt-4">
                    <div class="step active">1. Details</div>
                    <div class="step active">2. Payment</div>
                    <div class="step">3. Confirm</div>
                </div>
            </div>
            <div class="col-lg-7">
                <form class="row g-3" th:action="@{/tour/checkout}" method="post">
                    <input type="hidden" name="tourId" th:value="${tour.id()}">
                    <div class="col-md-6">
                        <label class="form-label">Full name</label>
                        <input class="form-control" name="fullName" value="Nguyen Van A" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Email</label>
                        <input class="form-control" type="email" name="email" value="demo@example.com" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Travelers</label>
                        <input class="form-control" type="number" min="1" max="9" name="travelers" value="2" required>
                    </div>
                    <div class="col-md-8">
                        <label class="form-label">Payment method</label>
                        <select class="form-select" name="paymentMethod">
                            <option>Mock card payment</option>
                            <option>VNPay sandbox</option>
                            <option>Momo sandbox</option>
                        </select>
                    </div>
                    <div class="col-12">
                        <label class="form-label">Note</label>
                        <textarea class="form-control" rows="4">This is a UI-only booking demo.</textarea>
                    </div>
                    <div class="col-12 d-flex gap-2">
                        <button class="btn btn-success btn-lg" type="submit">Proceed to payment</button>
                        <a class="btn btn-outline-secondary btn-lg" th:href="@{/tour}">Back</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
