spring.application.name=shop-dieudao

#thiết lập port cho web server tomcat
# đề thi yc cổng 8080 th xóa dòng này đi cx đc, vì default là 8080
#0...65.535 = 2^16 = 65.536 = 2 byte 16 số 01010101 tổ hợp l 65536
#o.1024 dành cho hệ thống mạng, ta sài từ 1025 trở đi, nên né port nổi tiếng
server.port=6969

#nơi chứa khai báo kết nối CSDL
#nơi chứa khai báo Swagger UI- ...
#Swagger UI là 1 web app nhỏ ký sinh vào app của mình
#app mình tại url http://localhost:8080/...


# Swagger/OpenAPI Configuration
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs


# khai bao cấu hình thymeleaf cho Tomcat nhìn
# Cấu hình Thymeleaf  ==========
#cache=false: Giúp cập nhật giao diện mà không cần khởi động lại app
spring.thymeleaf.cache=false 
#prefix: Nơi chứa UI/các trang thymeleaf
spring.thymeleaf.prefix=classpath:/templates/
#suffix: Mặc định Thymeleaf sẽ tìm file .html.
spring.thymeleaf.suffix=.html

# Cloudflare R2 image storage for tour prototype.
tour.s3.enabled=${TOUR_S3_ENABLED:false}
tour.s3.region=${TOUR_S3_REGION:auto}
tour.s3.bucket=${TOUR_S3_BUCKET:}
tour.s3.access-key=${TOUR_S3_ACCESS_KEY:}
tour.s3.secret-key=${TOUR_S3_SECRET_KEY:}
tour.s3.endpoint=${TOUR_S3_ENDPOINT:}
tour.s3.public-base-url=${TOUR_S3_PUBLIC_BASE_URL:}
tour.s3.max-image-size-bytes=${TOUR_S3_MAX_IMAGE_SIZE_BYTES:5242880}
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=6MB
